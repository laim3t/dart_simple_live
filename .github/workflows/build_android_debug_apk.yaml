name: build-android-debug-apk

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build_android_debug_apk.yaml'

jobs:
  build-android-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: stable
          cache: true

      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build Android debug APK
        run: |
          cd simple_live_app
          flutter build apk --debug

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp simple_live_app/build/app/outputs/flutter-apk/app-debug.apk artifacts/simple_live_app-1.11.4-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: artifacts/simple_live_app-1.11.4-debug.apk
          if-no-files-found: error
