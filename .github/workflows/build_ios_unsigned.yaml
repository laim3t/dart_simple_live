name: build-ios-unsigned

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build_ios_unsigned.yaml"

jobs:
  build-ios:
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      - name: Build iOS unsigned
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos
          zip -q -r ios_unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned
          path: simple_live_app/build/ios/iphoneos/ios_unsigned.ipa
